services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_n8n
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eSmzQdqAw68UodRwb5kiUz9TCwqEVrOh
      POSTGRES_DB: postgres
    # Ajuste: command fora do environment
    command: >
      postgres 
      -c max_connections=500 
      -c shared_buffers=256MB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s  # Aumentamos o intervalo
      timeout: 10s   # Aumentamos o timeout
      retries: 10    # Mais tentativas antes de desistir
      start_period: 40s # Tempo de carência para o banco ligar
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      # Certifique-se que este arquivo existe para criar os bancos evogo_auth e evogo_users
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - evolution_net
  
  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: alairtonpereira.dev@gmail.com
      PGADMIN_DEFAULT_PASSWORD: GYO9BW6F
    ports:
      - "8080:80"
    networks:
      - evolution_net

  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: evolution-go
    restart: always
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      CLIENT_NAME: "evolution"
      GLOBAL_API_KEY: "eSmzQdqAw68UodRwb5kiUz9TCwqEVrOh"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://:h8lKmUrXjr2UJaeYZuVNn4ntWsvzxgBn@redis:6379"

      # Correção: O host agora aponta para o serviço 'postgres'
      POSTGRES_AUTH_DB: "postgresql://postgres:eSmzQdqAw68UodRwb5kiUz9TCwqEVrOh@postgres:5432/evogo_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://postgres:eSmzQdqAw68UodRwb5kiUz9TCwqEVrOh@postgres:5432/evogo_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "false"
      INSTANCE_QRCODE_ENABLED: true

      WADEBUG: "INFO"
      LOGTYPE: "console"
      CONNECT_ON_STARTUP: "false"
      WEBHOOKFILES: "true"
      OS_NAME: "Linux"
      QRCODE_MAX_COUNT: "5"
    volumes:
      - ./evolution_data:/app/dbdata
      - ./evolution_logs:/app/logs
    networks:
      - evolution_net
    depends_on:
      postgres:
        condition: service_healthy

  n8n-evolution:
    image: n8nio/n8n:latest
    container_name: n8n-evolution
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=postgres
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=eSmzQdqAw68UodRwb5kiUz9TCwqEVrOh
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Fortaleza
      - N8N_LOG_LEVEL=debug
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - evolution_net
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine # Correção da imagem
    container_name: redis_n8n
    restart: always
    command: redis-server --requirepass h8lKmUrXjr2UJaeYZuVNn4ntWsvzxgBn --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - evolution_net

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  redis_data:
  evolution_instances:
  evolution_logs:
